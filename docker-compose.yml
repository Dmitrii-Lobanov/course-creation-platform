services:
  postgres:
    image: postgres:16-alpine
    container_name: courseforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: courseforge
      POSTGRES_PASSWORD: courseforge
      POSTGRES_DB: courseforge
    ports:
      - "5432:5432"
    volumes:
      - courseforge-postgres-data:/var/lib/postgresql/data

volumes:
  courseforge-postgres-data: